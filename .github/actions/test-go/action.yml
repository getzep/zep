name: 'Test Go Integration'
description: 'Vet, test, and lint a Zep Go integration package'

inputs:
  package:
    description: 'Framework key = directory name under integrations/ (e.g. adk)'
    required: true
  go-version:
    description: 'Go version to test with'
    required: true
    default: '1.26'

runs:
  using: 'composite'
  steps:
    - name: Set up Go ${{ inputs.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: Resolve package dir
      id: paths
      shell: bash
      run: |
        PKG_DIR="integrations/${{ inputs.package }}/go"
        echo "dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
        echo "Testing $PKG_DIR"

    - name: Download modules
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: go mod download

    - name: Vet
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: go vet ./...

    - name: Test
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: go test ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: ${{ steps.paths.outputs.dir }}
