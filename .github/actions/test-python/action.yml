name: 'Test Python Integration'
description: 'Lint, type-check, and test a Zep Python integration package'

inputs:
  package:
    description: 'Framework key = directory name under integrations/ (e.g. adk, crewai)'
    required: true
  python-version:
    description: 'Python version to test with'
    required: true
    default: '3.11'

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ inputs.python-version }}
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Resolve package paths
      id: paths
      shell: bash
      run: |
        PKG_DIR="integrations/${{ inputs.package }}/python"
        IMPORT_NAME="zep_$(echo '${{ inputs.package }}' | tr '-' '_')"
        echo "dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
        echo "import=$IMPORT_NAME" >> "$GITHUB_OUTPUT"
        echo "Testing $PKG_DIR (import name: $IMPORT_NAME)"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: uv sync --extra dev

    - name: Run linting
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Run type checking
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: uv run mypy src/

    - name: Run tests
      shell: bash
      working-directory: ${{ steps.paths.outputs.dir }}
      run: uv run pytest tests/ -v --cov=${{ steps.paths.outputs.import }} --cov-report=xml

    - name: Upload coverage
      if: inputs.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ${{ steps.paths.outputs.dir }}/coverage.xml
        flags: ${{ inputs.package }}
        name: ${{ inputs.package }}-coverage
