name: Codex PR Auto Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Restrict paid, secret-bearing reviews to PRs authored by members of the
    # getzep organization. COLLABORATOR is intentionally excluded because it
    # can include external repository collaborators.
    if: >-
      github.event.pull_request.draft == false &&
      (github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'OWNER')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.codex.outputs.final-message }}

    steps:
      # Keep PR-controlled files out of the working tree. In particular, this
      # ensures the prompt and repository instructions come from the trusted
      # base revision even though this job receives OPENAI_API_KEY.
      - name: Checkout trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      # Fetch the untrusted PR commits as Git objects for diffing, but never
      # check them out or execute content from them.
      - name: Fetch pull request head
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/codex/pr-head"

      - name: Run Codex review
        id: codex
        continue-on-error: true
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          permission-profile: ":read-only"

  post-review:
    needs: review
    if: needs.review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post Codex review
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CODEX_REVIEW: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const maxLength = 60_000;
            let body = process.env.CODEX_REVIEW;
            if (body.length > maxLength) {
              body = `${body.slice(0, maxLength)}\n\n_Review truncated by the workflow._`;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: "COMMENT",
              body,
            });
